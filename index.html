<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Glow Haven · Dark Cosmetics</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="logo">
      <i class="fas fa-spa"></i> Glow Haven
    </div>
    <div class="cart-icon-wrapper" id="cartToggle">
      <i class="fas fa-shopping-bag"></i>
      <span id="cart-count">0</span>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-text">
      <h2>Unleash your<br>midnight glow</h2>
      <p>Dark elegance · vegan & clean</p>
      <button class="hero-btn" id="shopNowBtn"><i class="fas fa-arrow-down" style="margin-right: 8px;"></i>Discover collection</button>
    </div>
    <div class="hero-image">
      <i class="fas fa-moon"></i>
    </div>
  </section>

  <!-- Products -->
  <div class="section-title">
    <i class="fas fa-gem"></i> 
   <h3>Dark treasure</h3>
  </div>
  <div class="products-grid" id="productsContainer"></div>

  <!-- Cart overlay + sidebar -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>Your Bag</h3>
      <button class="close-cart" id="closeCartBtn"><i class="fas fa-times"></i></button>
    </div>
    <div class="cart-items-container" id="cartItemsList"></div>
    <div class="cart-footer">
      <div class="total-row">
        <span>Total</span>
        <span id="cartTotal">$0.00</span>
      </div>
      <button class="checkout-btn" id="checkoutBtn"><i class="fas fa-lock" style="margin-right: 10px;"></i>Proceed to checkout</button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="developer-info">
        <h4><i class="fas fa-code"></i> Hammad Developer</h4>
        <p>
          <span><i class="fas fa-paint-brush"></i> Custom dark design</span>
          <span><i class="fab fa-wordpress"></i> WordPress expert</span>
          <h2>Contact for this type of website or
            <br> enhance website contact on <h1>03315048654</h1></h2>
  </footer>

  <script src="script.js"> </script>
</body>
</html>
